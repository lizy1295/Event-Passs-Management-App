<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- QRCode.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glass {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-glass:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(168, 85, 247, 0.6);
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.1);
        }

        #qrcode canvas,
        #qrcode img {
            margin: 0 auto;
            border-radius: 0.5rem;
        }

        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .fade-out {
            animation: fadeOut 0.4s ease-in forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: scale(1) translateY(0);
            }

            to {
                opacity: 0;
                transform: scale(0.95) translateY(-10px);
            }
        }

        /* Gradient background */
        .bg-mesh {
            background-color: #0f172a;
            background-image:
                radial-gradient(at 40% 20%, hsla(267, 100%, 75%, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(312, 100%, 75%, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(240, 100%, 75%, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 50%, hsla(267, 100%, 75%, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(312, 100%, 75%, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 100%, hsla(240, 100%, 75%, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 0%, hsla(312, 100%, 75%, 0.15) 0px, transparent 50%);
        }

        /* Ticket perforations */
        .ticket-cutout {
            position: absolute;
            top: 5rem;
            width: 2rem;
            height: 2rem;
            background-color: #0f172a;
            border-radius: 9999px;
            box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .ticket-cutout.left {
            left: -1rem;
        }

        .ticket-cutout.right {
            right: -1rem;
        }

        .dash-line {
            position: absolute;
            top: 6rem;
            left: 1.5rem;
            right: 1.5rem;
            height: 2px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.15) 50%, transparent 50%);
            background-size: 12px 2px;
            z-index: 5;
        }
    </style>
</head>

<body
    class="bg-mesh min-h-screen flex items-center justify-center p-4 antialiased text-slate-100 relative overflow-x-hidden">

    <!-- Registration Form -->
    <div id="registration-section" class="glass-panel w-full max-w-md rounded-[2rem] p-8 sm:p-10 fade-in z-10 w-full">
        <div class="text-center mb-10">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-purple-500 to-pink-500 mb-6 shadow-lg shadow-purple-500/30 ring-4 ring-white/5">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
                </svg>
            </div>
            <h1
                class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-fuchsia-400 to-pink-400">
                Summit 2026</h1>
            <p class="text-slate-400 text-sm mt-3 font-medium">Claim your exclusive digital pass</p>
        </div>

        <form id="registration-form" class="space-y-6">
            <div class="space-y-2">
                <label for="name" class="block text-sm font-semibold text-slate-300 ml-1">Full Name</label>
                <input type="text" id="name" required
                    class="input-glass w-full rounded-2xl px-5 py-4 text-white placeholder-slate-500 outline-none transition-all duration-300"
                    placeholder="Enter your name">
            </div>

            <div class="space-y-2">
                <label for="email" class="block text-sm font-semibold text-slate-300 ml-1">Email Address</label>
                <input type="email" id="email" required
                    class="input-glass w-full rounded-2xl px-5 py-4 text-white placeholder-slate-500 outline-none transition-all duration-300"
                    placeholder="you@company.com">
            </div>

            <div class="pt-4">
                <button type="submit"
                    class="w-full bg-gradient-to-r from-purple-600 hover:from-purple-500 to-pink-600 hover:to-pink-500 text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-purple-600/25 hover:shadow-purple-500/40 transform hover:-translate-y-1 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-purple-500/30 hover:scale-[1.02]">
                    Generate My Ticket
                </button>
            </div>
        </form>
    </div>

    <!-- Digital Ticket Card (Hidden initially) -->
    <div id="ticket-section"
        class="hidden glass-panel w-full max-w-sm rounded-[2rem] overflow-hidden relative z-10 w-full mx-auto">
        <!-- Cutouts and dashed line -->
        <div class="ticket-cutout left"></div>
        <div class="ticket-cutout right"></div>
        <div class="dash-line"></div>

        <!-- Ticket Header Content -->
        <div class="bg-white/5 pt-8 pb-10 px-8 text-center relative z-10">
            <h2 class="text-2xl font-black tracking-widest uppercase text-white drop-shadow-md">VIP Pass</h2>
            <p class="text-purple-300 text-sm font-medium mt-1 uppercase tracking-widest">Summit 2026</p>
        </div>

        <!-- Ticket Body -->
        <div class="px-8 pb-10 pt-8 text-center bg-transparent mt-2">
            <div class="mb-8">
                <p class="text-xs text-slate-400 font-semibold uppercase tracking-widest mb-1">Admit One</p>
                <p id="guest-name" class="text-2xl sm:text-3xl font-bold text-white tracking-tight break-words px-4">
                </p>
                <p id="guest-email" class="text-sm font-medium text-slate-400 mt-2 truncate max-w-full px-2"></p>
            </div>

            <div class="flex justify-center mb-6">
                <div class="relative group">
                    <div
                        class="absolute -inset-1 bg-gradient-to-r from-purple-500 to-pink-500 rounded-2xl blur opacity-30 group-hover:opacity-60 transition duration-500">
                    </div>
                    <div id="qrcode"
                        class="relative p-4 bg-white rounded-xl shadow-xl transform transition duration-500 hover:scale-[1.02]">
                    </div>
                </div>
            </div>

            <div
                class="inline-flex items-center space-x-2 text-xs font-semibold text-emerald-400 bg-emerald-400/10 px-3 py-1.5 rounded-full mt-2">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                <span>Active successfully</span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registration-form').addEventListener('submit', function (e) {
            e.preventDefault();

            // Get form values
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;

            // Generate QR Code containing the email and name
            const qrData = JSON.stringify({ name: name, email: email, type: 'VIP Pass' });

            // Clear previous QR code if any
            document.getElementById('qrcode').innerHTML = '';

            new QRCode(document.getElementById("qrcode"), {
                text: qrData,
                width: 180,
                height: 180,
                colorDark: "#0f172a",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // Update ticket details after QR is generated
            document.getElementById('guest-name').textContent = name;
            document.getElementById('guest-email').textContent = email;

            // Hide registration form with animation
            const formSection = document.getElementById('registration-section');
            formSection.classList.remove('fade-in');
            formSection.classList.add('fade-out');

            // Wait for fade out to complete
            setTimeout(() => {
                formSection.classList.add('hidden');

                // Show ticket section
                const ticketSection = document.getElementById('ticket-section');
                ticketSection.classList.remove('hidden');
                ticketSection.classList.add('fade-in');
            }, 400); // matches fadeOut animation duration
        });
    </script>
</body>

</html>
