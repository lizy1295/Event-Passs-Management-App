<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Entry Scanner</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- html5-qrcode -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .bg-dark-mesh {
            background-color: #0f172a;
            background-image:
                radial-gradient(at 10% 20%, hsla(228, 100%, 74%, 0.1) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(189, 100%, 56%, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(355, 100%, 93%, 0.1) 0px, transparent 50%),
                radial-gradient(at 80% 50%, hsla(340, 100%, 76%, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(22, 100%, 77%, 0.1) 0px, transparent 50%),
                radial-gradient(at 80% 100%, hsla(242, 100%, 70%, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 0%, hsla(343, 100%, 76%, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .glass {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        /* Style for HTML5 QR Code elements */
        #reader {
            border: none !important;
        }

        #reader video {
            object-fit: cover !important;
            border-radius: 1rem !important;
            width: 100% !important;
        }

        #reader__dashboard_section_csr span {
            color: white;
        }

        #reader__dashboard_section_swaplink {
            text-decoration: none;
            color: #38bdf8;
            margin-top: 0.5rem;
            display: inline-block;
        }

        #reader__dashboard_section_swaplink:hover {
            color: #7dd3fc;
        }

        /* Message animations */
        .msg-enter {
            animation: slideInDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .msg-exit {
            animation: slideOutUp 0.3s ease-in forwards;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translate(-50%, -10px);
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @keyframes slideOutUp {
            from {
                opacity: 1;
                transform: translate(-50%, 0);
            }

            to {
                opacity: 0;
                transform: translate(-50%, -10px);
            }
        }
    </style>
</head>

<body class="bg-dark-mesh min-h-screen text-slate-100 antialiased flex flex-col items-center justify-center p-4">

    <div class="glass w-full max-w-md rounded-[2rem] p-6 sm:p-8 relative z-10 mx-auto flex flex-col">
        <!-- Header -->
        <div class="flex items-center space-x-4 mb-6">
            <div
                class="flex-shrink-0 w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30 ring-4 ring-white/5">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                </svg>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white">Entry Scanner</h1>
                <p class="text-slate-400 text-sm">Staff access control</p>
            </div>
        </div>

        <!-- Scanner Container -->
        <div
            class="relative bg-slate-800/50 rounded-2xl p-2 border border-slate-700/50 shadow-inner w-full mb-6 max-h-[400px]">
            <!-- decorative scan line -->
            <div class="absolute inset-x-0 top-1/2 h-0.5 bg-blue-500/50 shadow-[0_0_8px_2px_rgba(59,130,246,0.6)] z-20 animate-[pulse_1.5s_ease-in-out_infinite] pointer-events-none hidden"
                id="scan-line"></div>

            <div id="reader" class="w-full rounded-xl overflow-hidden bg-black flex items-center justify-center"></div>
        </div>

        <!-- Actions -->
        <div class="flex flex-col space-y-3">
            <button id="start-btn"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-blue-500/25 transition-all transform hover:-translate-y-0.5 hover:shadow-blue-500/40">
                Start Scanning
            </button>
            <button id="stop-btn"
                class="hidden w-full bg-slate-700/80 hover:bg-slate-600/80 border border-slate-600 outline-none text-white font-semibold py-4 px-6 rounded-xl shadow transition-all">
                Stop Camera
            </button>
        </div>
    </div>

    <!-- Status Toast Notification -->
    <div id="status-toast"
        class="hidden fixed top-6 left-1/2 transform -translate-x-1/2 z-50 w-[90%] max-w-sm rounded-2xl p-4 shadow-2xl flex items-start space-x-3 backdrop-blur-md border border-white/10">
        <div id="toast-icon" class="flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center mt-0.5">
            <!-- Icons injected via JS -->
        </div>
        <div class="flex-1">
            <h3 id="toast-title" class="text-[15px] font-bold text-white tracking-tight"></h3>
            <p id="toast-message" class="text-[13px] text-slate-200 mt-1 leading-snug"></p>
        </div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // IMPORTANT: Replace this with your actual Firebase config!
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI Elements
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const scanLine = document.getElementById('scan-line');
        const toast = document.getElementById('status-toast');
        const toastIcon = document.getElementById('toast-icon');
        const toastTitle = document.getElementById('toast-title');
        const toastMessage = document.getElementById('toast-message');

        let html5QrCode;
        let isProcessing = false;

        // Icons for toast
        const successIcon = `<svg class="w-6 h-6 text-emerald-900" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" /></svg>`;
        const warningIcon = `<svg class="w-6 h-6 text-amber-900" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>`;
        const errorIcon = `<svg class="w-6 h-6 text-red-900" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" /></svg>`;

        function showToast(type, title, message) {
            toast.classList.remove('hidden', 'msg-exit');
            toast.classList.add('msg-enter');

            toastTitle.textContent = title;
            toastMessage.textContent = message;

            if (type === 'success') {
                toast.className = 'fixed top-6 left-1/2 z-50 w-[90%] max-w-sm rounded-2xl p-4 shadow-[0_20px_40px_-10px_rgba(16,185,129,0.5)] flex items-start space-x-3 backdrop-blur-xl border border-emerald-400/30 bg-emerald-900/90 msg-enter';
                toastIcon.className = 'flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center bg-emerald-400 shadow-lg shadow-emerald-500/40 text-emerald-900';
                toastIcon.innerHTML = successIcon;
            } else if (type === 'warning') {
                toast.className = 'fixed top-6 left-1/2 z-50 w-[90%] max-w-sm rounded-2xl p-4 shadow-[0_20px_40px_-10px_rgba(245,158,11,0.5)] flex items-start space-x-3 backdrop-blur-xl border border-amber-400/30 bg-amber-900/90 msg-enter';
                toastIcon.className = 'flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center bg-amber-400 shadow-lg shadow-amber-500/40 text-amber-900';
                toastIcon.innerHTML = warningIcon;
            } else {
                toast.className = 'fixed top-6 left-1/2 z-50 w-[90%] max-w-sm rounded-2xl p-4 shadow-[0_20px_40px_-10px_rgba(239,68,68,0.5)] flex items-start space-x-3 backdrop-blur-xl border border-red-400/30 bg-red-900/90 msg-enter';
                toastIcon.className = 'flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center bg-red-400 shadow-lg shadow-red-500/40 text-red-900';
                toastIcon.innerHTML = errorIcon;
            }

            // Auto hide the toast
            setTimeout(() => {
                toast.classList.remove('msg-enter');
                toast.classList.add('msg-exit');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 4000);
        }

        async function onScanSuccess(decodedText, decodedResult) {
            if (isProcessing) return;
            isProcessing = true;

            // Visual feedback loop
            scanLine.classList.remove('hidden');

            // Scanned text holds the Document ID
            const docId = decodedText.trim();

            try {
                // If it happens to be stringified JSON, grab '.id' if available
                let parsedId = docId;
                try {
                    const parsed = JSON.parse(docId);
                    if (parsed.id) parsedId = parsed.id;
                } catch (e) { }

                if (!parsedId) {
                    throw new Error("Invalid document ID format");
                }

                const docRef = doc(db, "guests", parsedId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const guestName = data.name || 'Guest';

                    if (data.hasCheckedIn === true) {
                        // Already checked in -> Shows Yellow Warning
                        showToast('warning', 'Already Checked In', `${guestName} was already validated previously.`);
                    } else {
                        // Not checked in -> Update and show Green Success
                        await updateDoc(docRef, {
                            hasCheckedIn: true,
                            checkInTime: new Date()
                        });
                        showToast('success', 'Access Granted', `Successfully checked in ${guestName}!`);
                    }
                } else {
                    showToast('error', 'Guest Not Found', 'No record matches this QR Code. Invalid pass.');
                }
            } catch (err) {
                console.error(err);
                if (err.code === 'permission-denied') {
                    showToast('error', 'Database Error', 'Firebase permission denied. Check configuration rules.');
                } else {
                    showToast('error', 'Processing Error', 'Failed to retrieve or parse the QR ticket.');
                }
            } finally {
                // Cool down for 3 seconds to avoid multiple reads of the same QR code rapidly
                setTimeout(() => {
                    isProcessing = false;
                    scanLine.classList.add('hidden');
                }, 3000);
            }
        }

        function onScanFailure(error) {
            // Unhandled Parse errors usually spam. 
            // html5-qrcode natively filters successful decodes via onScanSuccess
        }

        startBtn.addEventListener('click', () => {
            html5QrCode = new Html5Qrcode("reader");

            // Ensure camera opens the environment (back) camera
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, onScanFailure)
                .then(() => {
                    startBtn.classList.add('hidden');
                    stopBtn.classList.remove('hidden');
                })
                .catch((err) => {
                    console.error("Camera access error:", err);
                    showToast('error', 'Camera Error', 'Could not open the scanner. Ensure you have granted camera permissions.');
                });
        });

        stopBtn.addEventListener('click', () => {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    stopBtn.classList.add('hidden');
                    startBtn.classList.remove('hidden');
                    html5QrCode.clear();
                }).catch((err) => {
                    console.error("Error stopping scanner:", err);
                });
            }
        });
        
    </script>
</body>

</html>
